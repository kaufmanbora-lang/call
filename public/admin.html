<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="color-scheme" content="dark">
    <title>Оператор</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="admin-page">
    <main class="admin-screen">
      <form id="adminLogin" class="admin-login" autocomplete="off">
        <h1>Вход</h1>
        <label for="adminPassword">Пароль оператора</label>
        <input id="adminPassword" name="password" type="password" required autocomplete="current-password" autofocus>
        <button type="submit">Открыть экран</button>
        <p id="loginError" class="login-error" role="alert"></p>
      </form>

      <section id="operatorView" class="operator-view" aria-label="Набранный посетителем номер" hidden>
        <output id="operatorNumber" class="operator-number" aria-live="polite"></output>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/admin.js"></script>
  </body>
</html>
