services:
  - type: web
    runtime: node
    name: phone-live
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile --prod
    startCommand: pnpm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
